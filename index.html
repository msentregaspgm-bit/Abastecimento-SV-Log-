<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SV LOG - GESTÃO S-10</title>
    <style>
        :root { --bg: #000814; --card: #001D3D; --yellow: #FFD60A; --text: #E0E1DD; --green: #25D366; --red: #ff4d4d; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; font-size: 11px; }
        .header { text-align: center; padding: 8px; background: var(--card); border-bottom: 2px solid var(--yellow); border-radius: 8px; margin-bottom: 10px; }
        h1 { font-size: 13px; margin: 0; color: var(--yellow); text-transform: uppercase; }
        
        /* Filtro */
        .filter-box { background: var(--card); padding: 10px; border-radius: 6px; margin-bottom: 10px; display: flex; gap: 10px; align-items: center; }
        select { background: #003566; color: white; border: 1px solid var(--yellow); padding: 5px; border-radius: 4px; font-size: 11px; width: 100%; }

        .section-title { color: var(--yellow); font-weight: bold; text-transform: uppercase; font-size: 9px; margin: 12px 0 4px 0; border-left: 3px solid var(--yellow); padding-left: 8px; }
        .top-list { background: var(--card); border-radius: 6px; padding: 4px 10px; margin-bottom: 8px; overflow-x: auto; }
        
        /* Tabela Frota */
        table { width: 100%; border-collapse: collapse; margin-top: 5px; min-width: 300px; }
        th { text-align: left; color: var(--yellow); font-size: 8px; padding: 5px; border-bottom: 1px solid #555; }
        td { padding: 8px 5px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 10px; }
        .group-header { background: #003566; font-weight: bold; color: white; }

        .kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .kpi-card { background: var(--card); padding: 8px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1); }
        .kpi-card div { font-size: 13px; font-weight: bold; }
        .val { font-weight: bold; color: var(--yellow); text-align: right; }
        #loader { text-align:center; padding:30px; color:var(--yellow); }
    </style>
</head>
<body>

<div class="header"><h1>SV LOG - GESTÃO FROTA S-10</h1></div>

<div class="filter-box">
    <select id="mesFiltro" onchange="processarDados()">
        <option value="TODOS">Todos os Meses</option>
    </select>
</div>

<div id="loader">CARREGANDO DADOS...</div>

<div id="dashboard" style="display:none">
    
    <div class="section-title">Resumo por Grupo Operação (Coluna H)</div>
    <div class="top-list">
        <table id="tabelaGrupo">
            <thead>
                <tr>
                    <th>GRUPO (H)</th>
                    <th>LITROS</th>
                    <th>VALOR</th>
                    <th>MÉDIA</th>
                </tr>
            </thead>
            <tbody id="corpoGrupo"></tbody>
        </table>
    </div>

    <div class="section-title">Indicadores de Performance</div>
    <div class="kpi-grid">
        <div class="kpi-card"><small>Média Geral</small><div id="mediaGlobal" style="color:var(--green)">0.00</div></div>
        <div class="kpi-card"><small>Custo Médio Litro</small><div id="valorLitroMedio">R$ 0,00</div></div>
    </div>

    <div class="section-title">Ranking Motoristas</div>
    <div id="topMelhores" class="top-list"></div>

    <div class="section-title">Frequência Fornecedores</div>
    <div id="topFornecedores" class="top-list"></div>

</div>

<script>
    const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbzmHwFsmovV_3xhT7qLnrtHFMlDUi4IYch7IvVjlFNvljvyLYjuNL1zAmhC_tQJ5iJQ/exec";
    let dadosOriginais = [];

    const fmtNum = (n) => n.toLocaleString('pt-BR', {minimumFractionDigits: 2, maximumFractionDigits: 2});
    const fmtMoeda = (n) => n.toLocaleString('pt-BR', {style:'currency', currency:'BRL'});

    async function init() {
        try {
            const res = await fetch(URL_SCRIPT);
            dadosOriginais = await res.json();
            
            // Preencher Filtro de Meses
            const meses = [...new Set(dadosOriginais.map(d => {
                const data = new Date(d.data);
                return `${data.getMonth() + 1}/${data.getFullYear()}`;
            }))].sort();
            
            const select = document.getElementById('mesFiltro');
            meses.forEach(m => {
                const opt = document.createElement('option');
                opt.value = m;
                opt.innerText = m;
                select.appendChild(opt);
            });

            processarDados();
        } catch (e) { document.getElementById('loader').innerText = "Erro na conexão."; }
    }

    function processarDados() {
        const mesSel = document.getElementById('mesFiltro').value;
        
        // 1. Filtro de Tempo
        let dadosFiltrados = dadosOriginais;
        if (mesSel !== "TODOS") {
            dadosFiltrados = dadosOriginais.filter(d => {
                const data = new Date(d.data);
                return `${data.getMonth() + 1}/${data.getFullYear()}` === mesSel;
            });
        }

        // 2. Filtro de Saneamento KM/L
        const dadosMed = dadosFiltrados.filter(d => d.mediaLinha > 0 && d.mediaLinha <= 3);

        // --- KPIs GERAIS ---
        const custoM = dadosFiltrados.reduce((a, b) => a + b.valorUnit, 0) / dadosFiltrados.length;
        document.getElementById('valorLitroMedio').innerText = fmtMoeda(custoM || 0);
        
        const mediaG = dadosMed.length > 0 ? (dadosMed.reduce((a, b) => a + b.mediaLinha, 0) / dadosMed.length) : 0;
        document.getElementById('mediaGlobal').innerText = fmtNum(mediaG);

        // --- TABELA GRUPO OPERAÇÃO (Coluna H) ---
        const grupos = [...new Set(dadosFiltrados.map(d => d.grupoOp))];
        let htmlGrupo = "";
        grupos.forEach(g => {
            const sub = dadosFiltrados.filter(d => d.grupoOp === g);
            const litros = sub.reduce((a, b) => a + b.quantidade, 0);
            const valor = sub.reduce((a, b) => a + b.valorAbast, 0);
            const subMed = sub.filter(d => d.mediaLinha > 0 && d.mediaLinha <= 3);
            const media = subMed.length > 0 ? (subMed.reduce((a, b) => a + b.mediaLinha, 0) / subMed.length) : 0;
            
            htmlGrupo += `<tr>
                <td>${g}</td>
                <td>${fmtNum(litros)}</td>
                <td>${fmtMoeda(valor)}</td>
                <td style="color:var(--green)">${fmtNum(media)}</td>
            </tr>`;
        });
        document.getElementById('corpoGrupo').innerHTML = htmlGrupo;

        // --- RANKING MOTORISTAS ---
        const mot = [...new Set(dadosMed.map(d => d.motorista))];
        const perf = mot.map(m => {
            const sub = dadosMed.filter(x => x.motorista === m);
            return { nome: m, media: sub.reduce((a,b) => a + b.mediaLinha, 0) / sub.length };
        }).sort((a,b) => b.media - a.media).slice(0,5);
        document.getElementById('topMelhores').innerHTML = perf.map(x => 
            `<div style="display:flex; justify-content:space-between; padding:5px 0;"><span>${x.nome}</span><span class="val">${fmtNum(x.media)}</span></div>`).join('');

        // --- FORNECEDORES ---
        const forns = [...new Set(dadosFiltrados.map(d => d.fornecedor))];
        const rankingF = forns.map(f => {
            const count = dadosFiltrados.filter(x => x.fornecedor === f).length;
            return { nome: f, total: count };
        }).sort((a,b) => b.total - a.total).slice(0,5);
        document.getElementById('topFornecedores').innerHTML = rankingF.map(f => 
            `<div style="display:flex; justify-content:space-between; padding:5px 0;"><span>${f.nome}</span><span style="color:#4CC9FE">${f.total} Abast.</span></div>`).join('');

        document.getElementById('loader').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
    }

    init();
</script>
</body>
</html>
