<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SV MASTER BI - DIESEL S-10</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #000814; --card: #001D3D; --yellow: #FFD60A; --text: #E0E1DD; --green: #25D366; --red: #ff4d4d; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; }
        .header { text-align: center; padding: 15px; background: var(--card); border-bottom: 3px solid var(--yellow); border-radius: 10px; margin-bottom: 15px; }
        .section-title { color: var(--yellow); font-weight: bold; text-transform: uppercase; font-size: 11px; margin: 20px 0 10px 5px; border-left: 3px solid var(--yellow); padding-left: 10px; }
        .kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .kpi-card { background: var(--card); padding: 12px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .kpi-card small { font-size: 9px; color: #888; text-transform: uppercase; display: block; }
        .kpi-card div { font-size: 16px; font-weight: bold; margin-top: 4px; }
        .top-list { background: var(--card); border-radius: 8px; padding: 10px; margin-bottom: 15px; }
        .top-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 11px; align-items: center; }
        .val { font-weight: bold; color: var(--yellow); text-align: right; }
        .chart-box { background: var(--card); padding: 10px; border-radius: 10px; margin-bottom: 15px; }
        #loader { text-align:center; padding:50px; color:var(--yellow); font-weight:bold; }
    </style>
</head>
<body>

<div class="header"><h1>BI DIESEL S-10 (MÉDIA REAL)</h1></div>
<div id="loader">PROCESSANDO DIESEL S-10...</div>

<div id="dashboard" style="display:none">
    <div class="section-title">Resumo por Operação</div>
    <div id="resumoOp" class="top-list"></div>

    <div class="section-title">KPIs de Performance</div>
    <div class="kpi-grid">
        <div class="kpi-card"><small>Média Total Frota</small><div id="mediaGlobal" style="color:var(--green)">0.00</div></div>
        <div class="kpi-card"><small>Litro Médio</small><div id="valorLitroMedio">R$ 0,00</div></div>
        <div class="kpi-card"><small>Posto Mais Barato</small><div id="postoBarato" style="font-size:10px; color:var(--green)">---</div></div>
        <div class="kpi-card"><small>Posto Mais Caro</small><div id="postoCaro" style="font-size:10px; color:var(--red)">---</div></div>
    </div>

    <div class="section-title">Top 5 Fornecedores</div>
    <div id="topFornecedores" class="top-list"></div>

    <div class="section-title">Top 5 Melhores Motoristas (Média)</div>
    <div id="topMotoMelhores" class="top-list"></div>

    <div class="section-title">Top 5 Menores Motoristas (Média)</div>
    <div id="topMotoPiores" class="top-list"></div>

    <div class="chart-box"><canvas id="chartEfic"></canvas></div>
</div>

<script>
    const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbwvUN-xVuGKyI8i7ttzsxzbTHLNwt9bRYF9iMI1K5VSblRw-NcQac1ew09GR7aH_dTe/exec";

    async function init() {
        try {
            const res = await fetch(URL_SCRIPT);
            const dados = await res.json();
            
            if (dados.length === 0) {
                document.getElementById('loader').innerText = "Nenhum dado de DIESEL S-10 encontrado na Coluna O.";
                return;
            }

            // 1. MÉDIA GLOBAL (Soma das médias / Quantidade de abastecimentos)
            const somaMediasTotal = dados.reduce((a, b) => a + b.mediaLinha, 0);
            const mediaGlobal = somaMediasTotal / dados.length;
            const somaPrecosL = dados.reduce((a, b) => a + b.valorUnit, 0);

            document.getElementById('mediaGlobal').innerText = mediaGlobal.toFixed(2) + " KM/L";
            document.getElementById('valorLitroMedio').innerText = (somaPrecosL / dados.length).toLocaleString('pt-BR', {style:'currency', currency:'BRL'});

            // 2. RESUMO POR OPERAÇÃO
            const ops = [...new Set(dados.map(d => d.tipoOp))];
            document.getElementById('resumoOp').innerHTML = ops.map(op => {
                const sub = dados.filter(d => d.tipoOp === op);
                const valorOp = sub.reduce((a, b) => a + b.totalGasto, 0);
                // Média da operação = soma das médias das linhas / qtd de abastecimentos daquela op
                const mediaOp = sub.reduce((a, b) => a + b.mediaLinha, 0) / sub.length;
                return `<div class="top-item"><span>${op}</span><span class="val">${valorOp.toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}<br><small style="color:var(--green)">${mediaOp.toFixed(2)} km/l</small></span></div>`;
            }).join('');

            // 3. POSTOS
            const postos = [...new Set(dados.map(d => d.fornecedor))];
            const analiseP = postos.map(p => {
                const d = dados.filter(x => x.fornecedor === p);
                return { nome: p, preco: d.reduce((a,b) => a + b.valorUnit, 0) / d.length };
            }).sort((a,b) => a.preco - b.preco);
            document.getElementById('postoBarato').innerText = analiseP[0].nome + " (R$ " + analiseP[0].preco.toFixed(2) + ")";
            document.getElementById('postoCaro').innerText = analiseP[analiseP.length-1].nome + " (R$ " + analiseP[analiseP.length-1].preco.toFixed(2) + ")";

            // 4. MOTORISTAS (Ranking baseado na média da coluna O)
            const mot = [...new Set(dados.map(d => d.motorista))];
            const perf = mot.map(m => {
                const sub = dados.filter(x => x.motorista === m);
                // Média do motorista = soma das médias dele / abastecimentos dele
                const mMed = sub.reduce((a,b) => a + b.mediaLinha, 0) / sub.length;
                return { nome: m, media: mMed };
            }).sort((a,b) => b.media - a.media);

            document.getElementById('topMotoMelhores').innerHTML = perf.slice(0,5).map(x => `<div class="top-item"><span>${x.nome}</span><span class="val">${x.media.toFixed(2)}</span></div>`).join('');
            document.getElementById('topMotoPiores').innerHTML = [...perf].reverse().slice(0,5).map(x => `<div class="top-item"><span>${x.nome}</span><span class="val">${x.media.toFixed(2)}</span></div>`).join('');

            // 5. FORNECEDORES
            const freq = {};
            dados.forEach(d => freq[d.fornecedor] = (freq[d.fornecedor] || 0) + 1);
            const topP = Object.entries(freq).sort((a,b) => b[1] - a[1]).slice(0,5);
            document.getElementById('topFornecedores').innerHTML = topP.map(p => `<div class="top-item"><span>${p[0]}</span><span class="val">${p[1]} Abast.</span></div>`).join('');

            // Gráfico
            new Chart(document.getElementById('chartEfic'), {
                type: 'bar',
                data: { labels: perf.slice(0,8).map(x=>x.nome), datasets: [{ label: 'KM/L (Coluna O)', data: perf.slice(0,8).map(x=>x.media), backgroundColor: '#FFD60A' }] },
                options: { scales: { y: { beginAtZero: false, min: Math.min(...perf.map(x=>x.media))*0.9 } } }
            });

            document.getElementById('loader').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
        } catch (e) { document.getElementById('loader').innerText = "Erro ao processar as médias da Coluna O."; }
    }
    init();
</script>
</body>
</html>
