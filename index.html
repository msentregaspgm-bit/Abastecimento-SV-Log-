<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SV LOG - BI S-10 FILTRADO</title>
    <style>
        :root { --bg: #000814; --card: #001D3D; --yellow: #FFD60A; --text: #E0E1DD; --green: #25D366; --red: #ff4d4d; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; font-size: 11px; }
        .header { text-align: center; padding: 8px; background: var(--card); border-bottom: 2px solid var(--yellow); border-radius: 8px; margin-bottom: 10px; }
        h1 { font-size: 13px; margin: 0; color: var(--yellow); text-transform: uppercase; }
        .section-title { color: var(--yellow); font-weight: bold; text-transform: uppercase; font-size: 9px; margin: 12px 0 4px 0; border-left: 3px solid var(--yellow); padding-left: 8px; }
        .kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .kpi-card { background: var(--card); padding: 8px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1); }
        .kpi-card small { font-size: 8px; color: #888; display: block; text-transform: uppercase; }
        .kpi-card div { font-size: 13px; font-weight: bold; margin-top: 2px; }
        .top-list { background: var(--card); border-radius: 6px; padding: 4px 10px; margin-bottom: 8px; }
        .top-item { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.05); align-items: center; }
        .top-item:last-child { border-bottom: none; }
        .val { font-weight: bold; color: var(--yellow); text-align: right; line-height: 1.2; }
        #loader { text-align:center; padding:30px; color:var(--yellow); }
        .red-t { color: var(--red); }
        .green-t { color: var(--green); }
    </style>
</head>
<body>

<div class="header"><h1>BI PERFORMANCE S-10</h1></div>
<div id="loader">FILTRANDO MÉDIAS (0 A 3 KM/L)...</div>

<div id="dashboard" style="display:none">
    
    <div class="section-title">Resumo por Tipo Operação (Totais)</div>
    <div id="resumoOp" class="top-list"></div>

    <div class="section-title">Performance S-10 (Médias 0-3 km/l)</div>
    <div class="kpi-grid">
        <div class="kpi-card"><small>Média Geral Sanitizada</small><div id="mediaGlobal" class="green-t">0.00</div></div>
        <div class="kpi-card"><small>Custo Médio Litro</small><div id="valorLitroMedio">R$ 0,00</div></div>
        <div class="kpi-card"><small>Fornecedor Econômico</small><div id="postoBarato" class="green-t" style="font-size:10px">---</div></div>
        <div class="kpi-card"><small>Fornecedor Mais Caro</small><div id="postoCaro" class="red-t" style="font-size:10px">---</div></div>
    </div>

    <div class="section-title">Ranking Motoristas (Válidos)</div>
    <div id="topMelhores" class="top-list"></div>

    <div class="section-title">Alertas de Performance (Piores)</div>
    <div id="topPiores" class="top-list"></div>

</div>

<script>
    const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbzjBFIelj-IZg3fnsZyqbF03z5EObb0REFAFcBxEKteHXkaHyWlvtJWaJ_iucmU_Hd72g/exec";

    const fmtNum = (n) => n.toLocaleString('pt-BR', {minimumFractionDigits: 2, maximumFractionDigits: 2});
    const fmtMoeda = (n) => n.toLocaleString('pt-BR', {style:'currency', currency:'BRL'});

    async function init() {
        try {
            const res = await fetch(URL_SCRIPT);
            const todosOsDados = await res.json();
            
            if (todosOsDados.length === 0) {
                document.getElementById('loader').innerText = "Sem dados de DIESEL S-10.";
                return;
            }

            // --- FILTRO DE SANEAMENTO ---
            // Só entram para médias valores acima de 0 e abaixo de 3.01
            const dadosMediaVailda = todosOsDados.filter(d => d.mediaLinha > 0 && d.mediaLinha <= 3);

            // 1. CUSTO MÉDIO LITRO (Usa todos os dados S-10)
            const custoM = todosOsDados.reduce((a, b) => a + b.valorUnit, 0) / todosOsDados.length;
            document.getElementById('valorLitroMedio').innerText = fmtMoeda(custoM);

            // 2. MÉDIA GLOBAL (Apenas dados sanitizados)
            const mediaG = dadosMediaVailda.length > 0 ? (dadosMediaVailda.reduce((a, b) => a + b.mediaLinha, 0) / dadosMediaVailda.length) : 0;
            document.getElementById('mediaGlobal').innerText = fmtNum(mediaG);

            // 3. POSTOS (Usa todos os dados S-10)
            const nomesPostos = [...new Set(todosOsDados.map(d => d.fornecedor))];
            const analisePostos = nomesPostos.map(p => {
                const regs = todosOsDados.filter(x => x.fornecedor === p);
                return { nome: p, media: regs.reduce((a, b) => a + b.valorUnit, 0) / regs.length };
            }).sort((a,b) => a.media - b.media);

            document.getElementById('postoBarato').innerText = `${analisePostos[0].nome} (${fmtMoeda(analisePostos[0].media)})`;
            document.getElementById('postoCaro').innerText = `${analisePostos[analisePostos.length-1].nome} (${fmtMoeda(analisePostos[analisePostos.length-1].media)})`;

            // 4. RESUMO OPERAÇÃO (Totais Financeiros e de Volume)
            const tipos = [...new Set(todosOsDados.map(d => d.tipoOp))];
            document.getElementById('resumoOp').innerHTML = tipos.map(t => {
                const sub = todosOsDados.filter(d => d.tipoOp === t);
                const litrosTotais = sub.reduce((a, b) => a + b.quantidade, 0);
                const valorTotalOp = sub.reduce((a, b) => a + b.valorAbast, 0);
                return `<div class="top-item">
                            <span>${t}</span>
                            <span class="val">${fmtNum(litrosTotais)} L<br><small style="color:var(--green)">${fmtMoeda(valorTotalOp)}</small></span>
                        </div>`;
            }).join('');

            // 5. MOTORISTAS (Apenas dados sanitizados)
            const mot = [...new Set(dadosMediaVailda.map(d => d.motorista))];
            const perf = mot.map(m => {
                const sub = dadosMediaVailda.filter(x => x.motorista === m);
                return { nome: m, media: sub.reduce((a,b) => a + b.mediaLinha, 0) / sub.length };
            }).sort((a,b) => b.media - a.media);

            document.getElementById('topMelhores').innerHTML = perf.slice(0,5).map(x => 
                `<div class="top-item"><span>${x.nome}</span><span class="val green-t">${fmtNum(x.media)}</span></div>`).join('');
            document.getElementById('topPiores').innerHTML = [...perf].reverse().slice(0,5).map(x => 
                `<div class="top-item"><span>${x.nome}</span><span class="val red-t">${fmtNum(x.media)}</span></div>`).join('');

            document.getElementById('loader').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
        } catch (e) { document.getElementById('loader').innerText = "Erro ao processar filtros."; }
    }
    init();
</script>
</body>
</html>
